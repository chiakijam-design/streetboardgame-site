<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ページが見つかりません｜わたちゃん</title>
  <meta name="description" content="お探しのページは見つかりませんでした。わたちゃんのトップページから、彼氏の愛情判定ゲームやシリーズ作品をお楽しみください。" />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#EC4F88" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon-48.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans JP", sans-serif;
      color: #1a1a1a;
      background: #ec4f88;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
      background: #ec4f88;
    }
    main {
      width: min(100%, 520px);
      padding: 32px 22px 26px;
      text-align: center;
      background: #fff;
      border: 3px solid #1a1a1a;
      border-radius: 18px;
      box-shadow: 6px 6px 0 #1a1a1a;
    }
    .label {
      display: inline-block;
      margin-bottom: 18px;
      padding: 6px 15px;
      color: #ffe26b;
      background: #1a1a1a;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .12em;
    }
    h1 {
      margin: 0;
      color: #ec4f88;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.25;
    }
    p {
      margin: 16px auto 0;
      max-width: 390px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.8;
    }
    nav {
      display: grid;
      gap: 12px;
      margin-top: 26px;
    }
    a {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      color: #1a1a1a;
      background: #fff;
      border: 2.5px solid #1a1a1a;
      border-radius: 13px;
      box-shadow: 3px 3px 0 #1a1a1a;
      font-size: 15px;
      font-weight: 900;
      text-decoration: none;
      touch-action: manipulation;
    }
    a.primary {
      color: #fff;
      background: #1a1a1a;
      box-shadow: 4px 4px 0 #5bd4e8;
    }
    a:focus-visible {
      outline: 4px solid #5bd4e8;
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <div class="label">404 NOT FOUND</div>
    <h1>ページが見つかりません</h1>
    <p>URLが変わったか、ページが削除された可能性があります。トップページから遊びたいゲームを選んでください。</p>
    <nav aria-label="404ページからの移動先">
      <a class="primary" href="/">トップページに戻る</a>
      <a href="/love">彼氏の愛情判定を見る</a>
      <a href="/remote">遠隔で2人の理解度判定を見る</a>
    </nav>
  </main>
</body>
</html>
