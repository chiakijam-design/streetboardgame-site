<!-- =========================
  旧Wix URL からのルーティング
  ※ SPA なので物理ページは1つ(index.html)。URL パスに応じて
    アプリの初期画面を切り替えるために window.__INITIAL_SCREEN を立てる。

  マッピング:
    /          → トップ画面
    /watachan  → 遊び方(How to play)画面
    /friends   → 友達の友情確認バージョン
    /contact   → お問い合わせ(About のフォーム位置までスクロール)
    その他     → トップ画面 (旧URLからの誘導は全部トップへ)
========================= -->
<script>
  (function() {
    // テスト用: ?screen=intro|friendIntro|about|top で強制的に初期画面を指定可能
    var query = new URLSearchParams(location.search);
    var forceScreen = query.get('screen');
    if (forceScreen && ['top','intro','friendIntro','about'].indexOf(forceScreen) >= 0) {
      window.__INITIAL_SCREEN = forceScreen;
      if (forceScreen === 'about' && query.get('to') === 'contact') {
        window.__SCROLL_TO_CONTACT = true;
      }
      return;
    }

    // ルーティングは全環境で発動 (Genspark Hosted の一時URLでも /watachan 等のパス想定)
    var path = decodeURIComponent(location.pathname);

    // Genspark Hosted のプレビュー環境などで pathの先頭に余計なプレフィックスが入る場合の
    // 簡易対応: pathの末尾だけを見る
    var lastSegment = path.replace(/\/+$/,'').split('/').pop().toLowerCase();

    // ルーティングテーブル: [パス末尾] → 初期screen
    var routes = {
      '': 'top',
      'index.html': 'top',
      'watachan': 'intro',
      'friends': 'friendIntro',
      'contact': 'about',
    };

    // 既知ルートに hit
    if (routes.hasOwnProperty(lastSegment)) {
      window.__INITIAL_SCREEN = routes[lastSegment];
      // contact の場合は スクロール先指定
      if (lastSegment === 'contact') {
        window.__SCROLL_TO_CONTACT = true;
      }
      // GA に旧URLアクセスを記録
      if (lastSegment !== '' && lastSegment !== 'index.html' && typeof gtag === 'function') {
        gtag('event', 'legacy_url_route', { from: path, to: routes[lastSegment] });
      }
      return;
    }

    // 未知パスはトップに集約
    window.__INITIAL_SCREEN = 'top';
    if (typeof gtag === 'function') {
      gtag('event', 'unknown_url_route', { from: path });
    }
  })();
</script>
