<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#EC4F88">
  <title>YouTuberと視聴者の絆を判定する、私のことちゃんとわかってるよね?Youtubeライブver. | わたちゃん</title>
  <meta name="description" content="YouTubeチャンネルから企画を作成し、YouTuber本人と視聴者が同時回答するライブゲームの作成・参加ページです。">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <link rel="canonical" href="https://www.streetboardgame.com/live">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=RocknRoll+One&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    :root { --pink:#EC4F88; --pink-deep:#D63A75; --cyan:#5BD4E8; --yellow:#FFE26B; --black:#1A1A1A; --white:#FFF; --cream:#FFF8F1; --muted:#76666C; }
    * { box-sizing:border-box; }
    [hidden] { display:none !important; }
    html { background:var(--pink); }
    body { margin:0; min-height:100dvh; background:var(--pink); color:var(--black); font-family:"Zen Maru Gothic",sans-serif; -webkit-font-smoothing:antialiased; }
    button,input,textarea,select { font:inherit; }
    button,a { -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
    button { cursor:pointer; }
    button:disabled { cursor:not-allowed; opacity:.52; }
    .shell { width:min(100%,820px); min-height:100dvh; margin:0 auto; padding:20px 16px calc(40px + env(safe-area-inset-bottom)); }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .brand { color:#fff; font-family:"RocknRoll One",sans-serif; font-size:15px; text-decoration:none; text-shadow:2px 2px 0 #000; }
    .back { min-height:42px; padding:8px 14px; border:2px solid var(--black); border-radius:999px; background:#fff; color:#000; font-weight:900; box-shadow:2px 2px 0 #000; }
    .hero { position:relative; overflow:hidden; padding:26px 20px; border:3px solid var(--black); border-radius:20px; background:var(--black); color:#fff; box-shadow:6px 6px 0 rgba(0,0,0,.24); text-align:center; }
    .eyebrow { display:inline-flex; padding:5px 10px; border-radius:999px; background:var(--yellow); color:#000; font:900 11px "DotGothic16",monospace; letter-spacing:.12em; }
    h1 { margin:14px 0 8px; color:#fff; font:400 clamp(29px,9vw,48px)/1.25 "RocknRoll One",sans-serif; text-shadow:3px 3px 0 var(--cyan); }
    .hero .live-series-title { font-size:clamp(16px,4.4vw,36px); line-height:1.4; }
    .live-series-title span { display:block; white-space:nowrap; }
    .hero p { margin:0 auto; max-width:560px; font-size:13px; line-height:1.8; font-weight:700; }
    .grid { display:grid; gap:14px; margin-top:18px; }
    .entry-card,.panel,.question-card,.result-card { border:3px solid var(--black); border-radius:16px; background:#fff; box-shadow:5px 5px 0 #000; }
    .entry-card { width:100%; min-height:150px; padding:20px; text-align:left; }
    .entry-card strong { display:block; margin:6px 0; font-size:20px; }
    .entry-icon { font-size:32px; }
    .entry-card small { display:block; color:var(--muted); line-height:1.65; font-weight:700; }
    .panel { padding:18px; }
    .panel + .panel { margin-top:16px; }
    h2 { margin:0 0 12px; font-size:22px; line-height:1.4; }
    h3 { margin:0; font-size:16px; line-height:1.5; }
    .help { margin:7px 0 0; color:var(--muted); font-size:12px; line-height:1.7; font-weight:700; }
    .field { display:grid; gap:6px; margin-top:14px; }
    .field label,.field-label { font-size:12px; font-weight:900; }
    input,textarea,select { width:100%; min-height:48px; border:2px solid var(--black); border-radius:10px; background:#fff; color:#000; padding:11px 12px; outline:none; }
    textarea { min-height:84px; resize:vertical; line-height:1.6; }
    input:focus,textarea:focus,select:focus { border-color:var(--pink-deep); box-shadow:0 0 0 3px rgba(236,79,136,.18); }
    .primary,.secondary,.danger,.mini { min-height:50px; border:3px solid var(--black); border-radius:12px; padding:10px 15px; font-weight:900; box-shadow:4px 4px 0 #000; }
    .primary { width:100%; background:var(--black); color:#fff; }
    .primary .accent { color:var(--yellow); }
    .secondary { background:var(--yellow); color:#000; }
    .danger { background:#fff; color:#B5204E; }
    .mini { min-height:40px; border-width:2px; padding:7px 11px; border-radius:9px; background:#fff; box-shadow:2px 2px 0 #000; font-size:11px; }
    .actions { display:flex; flex-wrap:wrap; gap:9px; margin-top:14px; }
    .actions > * { flex:1 1 130px; }
    .link-button { display:inline-flex; align-items:center; justify-content:center; color:#000; text-decoration:none; }
    .secret-output { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:12px 0; padding:11px; border:2px solid #000; border-radius:10px; background:#FFF9D7; overflow-wrap:anywhere; }
    .secret-output code { min-width:0; font:900 12px/1.5 ui-monospace,monospace; }
    .tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:16px 0; }
    .tab { min-height:48px; border:2px solid var(--black); border-radius:12px; background:#fff; font-size:12px; font-weight:900; }
    .tab[aria-selected="true"] { background:var(--yellow); box-shadow:3px 3px 0 #000; }
    .candidate-list,.question-list,.result-list { display:grid; gap:14px; }
    .question-card { padding:15px; }
    .question-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .badge { display:inline-flex; align-items:center; min-height:25px; padding:4px 8px; border:2px solid #000; border-radius:999px; background:var(--cyan); font-size:10px; font-weight:900; }
    .check { display:flex; align-items:center; gap:8px; font-weight:900; }
    .check input { width:22px; min-height:22px; accent-color:var(--pink); }
    .option-row { display:grid; grid-template-columns:minmax(0,1fr) 42px; gap:8px; margin-top:8px; }
    .option-row button { min-height:46px; border:2px solid #000; border-radius:10px; background:#fff; font-weight:900; }
    .order { display:flex; gap:7px; }
    .order button { min-width:40px; }
    .sticky-actions { position:sticky; bottom:8px; z-index:5; margin-top:18px; padding:10px; border:2px solid #000; border-radius:15px; background:rgba(255,248,241,.96); backdrop-filter:blur(8px); }
    .error { margin:12px 0 0; padding:11px; border:2px solid #8E173D; border-radius:10px; background:#FFE2EC; color:#7E1235; font-size:12px; line-height:1.6; font-weight:900; }
    .system-status { display:grid; gap:4px; margin:0 0 16px; padding:12px 14px; border:3px solid #000; border-radius:13px; background:var(--yellow); box-shadow:4px 4px 0 #000; font-size:12px; line-height:1.6; }
    .system-status.maintenance { background:#FFE2EC; color:#7E1235; }
    .system-status strong { font-size:14px; }
    .notice { margin-top:12px; padding:11px; border:2px solid #000; border-radius:10px; background:#E8FAFD; font-size:12px; line-height:1.65; font-weight:800; }
    .invite-notice { background:#FFF9D7; }
    .invite-notice strong { font-size:14px; }
    .invite-request-link { width:100%; margin-top:10px; text-align:center; }
    .inquiry-panel { scroll-margin-top:16px; background:linear-gradient(145deg,#FFF9D7 0%,#FFF 48%,#E8FAFD 100%); }
    .invite-guide { display:grid; gap:9px; margin-top:16px; }
    .invite-step { display:grid; grid-template-columns:36px minmax(0,1fr); gap:10px; align-items:start; padding:11px; border:2px solid #000; border-radius:12px; background:#fff; box-shadow:2px 2px 0 #000; }
    .invite-step > span { display:grid; place-items:center; width:34px; height:34px; border:2px solid #000; border-radius:50%; background:var(--yellow); font:900 14px "DotGothic16",monospace; }
    .invite-step strong { display:block; font-size:13px; }
    .invite-step p { margin:3px 0 0; color:var(--muted); font-size:11px; line-height:1.55; font-weight:700; }
    .invite-step:nth-child(2) > span { background:var(--cyan); }
    .invite-step:nth-child(3) > span { background:var(--pink); color:#fff; }
    .invite-code-help { background:#F2EEFF; }
    .viewer-entry-panel { overflow:hidden; background:linear-gradient(145deg,#FFF5A8 0%,#FFF 58%,#DDF8FC 100%); }
    .viewer-entry-heading { display:grid; grid-template-columns:46px minmax(0,1fr); gap:11px; align-items:center; margin-top:12px; }
    .viewer-entry-heading h2 { margin:0; font-size:21px; }
    .viewer-entry-heading p { margin:4px 0 0; color:var(--muted); font-size:12px; line-height:1.65; font-weight:800; }
    .viewer-entry-icon { display:grid; place-items:center; width:46px; height:46px; border:2px solid #000; border-radius:50%; background:#fff; box-shadow:2px 2px 0 #000; font-size:23px; }
    .viewer-entry-steps { display:grid; gap:7px; margin-top:14px; }
    .viewer-entry-steps span { display:flex; align-items:center; gap:8px; min-height:40px; padding:7px 10px; border:2px solid #000; border-radius:10px; background:#fff; font-size:11px; font-weight:900; }
    .viewer-entry-steps b { display:grid; flex:0 0 25px; place-items:center; width:25px; height:25px; border:2px solid #000; border-radius:50%; background:var(--cyan); font:900 11px "DotGothic16",monospace; }
    .viewer-entry-steps span:nth-child(2) b { background:var(--pink); color:#fff; }
    .viewer-entry-panel #entryRoomCode { font-size:18px; font-weight:900; letter-spacing:.08em; }
    .viewer-entry-panel #joinByCode { background:var(--yellow); }
    .viewer-entry-note { text-align:center; }
    .live-inquiry-form { margin-top:16px; padding-top:3px; }
    .live-inquiry-form .primary { margin-top:14px; }
    .inquiry-consent { background:#fff; }
    .inquiry-consent a { color:#7E1235; font-weight:900; }
    .inquiry-status { margin-top:14px; }
    .inquiry-status.notice,.inquiry-status.error { margin-bottom:0; }
    .inquiry-honeypot { position:absolute !important; left:-10000px !important; width:1px !important; height:1px !important; min-height:0 !important; opacity:0 !important; pointer-events:none !important; }
    .room-code { margin:12px 0; color:var(--pink-deep); font:900 clamp(42px,14vw,72px)/1 "DotGothic16",monospace; letter-spacing:.08em; text-align:center; }
    .participant-chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; }
    .participant-chips span { padding:6px 10px; border:2px solid #000; border-radius:999px; background:var(--yellow); font-size:11px; font-weight:900; }
    .vote-options { display:grid; gap:10px; margin-top:16px; }
    .vote-option { display:flex; align-items:center; gap:8px; min-height:58px; border:3px solid #000; border-radius:13px; background:#fff; box-shadow:3px 3px 0 #000; padding:12px; text-align:left; font-weight:900; }
    .vote-option.selected { background:var(--yellow); }
    .live-vote-count { flex:0 0 auto; margin-left:auto; padding:5px 8px; border:2px solid #000; border-radius:999px; background:var(--cyan); font:900 11px "DotGothic16",monospace; white-space:nowrap; }
    .progress { margin-bottom:10px; font:900 11px "DotGothic16",monospace; letter-spacing:.08em; }
    .bar-row { margin-top:12px; }
    .bar-label { display:flex; justify-content:space-between; gap:10px; font-size:12px; font-weight:900; }
    .bar { height:16px; margin-top:5px; overflow:hidden; border:2px solid #000; border-radius:999px; background:#fff; }
    .bar > span { display:block; height:100%; background:var(--cyan); }
    .result-card { padding:16px; }
    .verdict { margin-top:14px; padding:12px; border:3px solid #000; border-radius:12px; background:var(--yellow); text-align:center; font-size:20px; font-weight:900; }
    .personal-result { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:12px; padding:12px; border:3px solid #000; border-radius:12px; background:var(--yellow); font-size:13px; font-weight:900; }
    .personal-result strong { flex:0 0 auto; color:var(--pink-deep); font-size:17px; }
    .personal-summary { display:grid; gap:4px; margin:12px 0 18px; padding:16px; border:3px solid #000; border-radius:14px; background:var(--cyan); text-align:center; box-shadow:4px 4px 0 #000; }
    .personal-summary strong { font-size:24px; }
    .personal-summary span { font-size:12px; font-weight:800; }
    .editor-intro-panel { overflow:hidden; padding:0; background:linear-gradient(145deg,#FFF5A8 0%,#FFD9E8 52%,#DDF8FC 100%); }
    .editor-intro-copy { padding:20px 18px 16px; }
    .editor-intro-copy h2 { margin-top:10px; }
    .editor-flow { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:7px; padding:0 14px 16px; }
    .editor-flow-step { position:relative; min-width:0; padding:11px 7px 10px; border:2px solid #000; border-radius:13px; background:#fff; text-align:center; box-shadow:2px 2px 0 #000; }
    .editor-flow-step.is-done { background:var(--cyan); }
    .editor-flow-step.is-current { background:var(--yellow); transform:translateY(-3px); box-shadow:3px 4px 0 #000; }
    .editor-flow-step strong { display:grid; place-items:center; width:25px; height:25px; margin:0 auto 5px; border:2px solid #000; border-radius:50%; background:#fff; font:900 12px "DotGothic16",monospace; }
    .editor-flow-step span { display:block; font-size:10px; line-height:1.35; font-weight:900; }
    .editor-flow-step small { display:block; margin-top:3px; color:#7E1235; font-size:8px; font-weight:900; }
    .editor-settings { display:grid; gap:11px; padding:16px 18px 20px; border-top:3px solid #000; background:rgba(255,255,255,.84); }
    .editor-settings-title { display:flex; align-items:center; gap:8px; margin-bottom:-2px; font-size:14px; font-weight:900; }
    .editor-settings-title span { display:grid; place-items:center; width:31px; height:31px; border:2px solid #000; border-radius:50%; background:var(--pink); color:#fff; }
    .editor-settings .field { margin-top:0; }
    .editor-settings input { background:#fff; box-shadow:2px 2px 0 rgba(0,0,0,.15); }
    .editor-vote-setting { grid-column:1 / -1; padding:13px; border:2px solid #000; border-radius:12px; background:#FFF9D7; }
    .editor-vote-setting .check { align-items:flex-start; margin-top:7px; }
    .editor-type-summary { display:flex; align-items:center; flex-wrap:wrap; gap:7px; padding:10px 12px; border:2px solid #000; border-radius:11px; background:#E8FAFD; font-size:11px; font-weight:900; }
    .editor-type-summary .badge { flex:0 0 auto; }
    .editor-question-panel { background:#FFF8F1; }
    .editor-question-heading { align-items:center; margin-bottom:15px; padding:2px 2px 12px; border-bottom:2px dashed #D6AEBB; }
    .editor-question-heading h2 { margin-bottom:2px; }
    .editor-count { display:inline-grid; place-items:center; min-width:64px; min-height:43px; padding:6px 10px; border:3px solid #000; border-radius:999px; background:var(--yellow); box-shadow:2px 2px 0 #000; font-size:12px; font-weight:900; }
    .editor-question-card { --card-accent:var(--pink); overflow:hidden; padding:0; background:#FFF0F6; }
    .editor-question-card:nth-child(4n + 2) { --card-accent:#20BCD3; background:#E9FBFE; }
    .editor-question-card:nth-child(4n + 3) { --card-accent:#F0B900; background:#FFF9D7; }
    .editor-question-card:nth-child(4n) { --card-accent:#8D72D9; background:#F2EEFF; }
    .editor-question-top { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 13px; border-bottom:3px solid #000; background:var(--card-accent); }
    .editor-question-number { display:flex; align-items:center; gap:8px; color:#fff; font-size:13px; font-weight:900; text-shadow:1px 1px 0 #000; }
    .editor-question-number .badge { min-width:42px; justify-content:center; background:#fff; color:#000; text-shadow:none; font-size:12px; }
    .editor-question-actions { display:flex; flex-wrap:wrap; justify-content:flex-end; gap:6px; }
    .editor-question-actions .mini { min-height:36px; padding:6px 9px; background:#fff; font-size:10px; }
    .editor-question-actions .delete-question { background:#FFE2EC; color:#8E173D; }
    .editor-question-body { padding:15px 14px 16px; }
    .editor-field-label { display:flex; align-items:center; gap:7px; font-size:12px; font-weight:900; }
    .editor-field-label::before { display:grid; place-items:center; flex:0 0 23px; width:23px; height:23px; border:2px solid #000; border-radius:7px; background:#fff; content:attr(data-icon); font-size:11px; }
    .editor-question-body textarea { background:#fff; font-weight:700; box-shadow:2px 2px 0 rgba(0,0,0,.12); }
    .editor-type-lock { display:grid; grid-template-columns:minmax(0,1fr) auto; align-items:center; gap:8px; }
    .editor-type-lock select { min-height:44px; background:#fff; font-weight:900; }
    .editor-lock-badge { padding:5px 8px; border:2px solid #000; border-radius:999px; background:var(--cyan); font-size:9px; font-weight:900; white-space:nowrap; }
    .editor-options { display:grid; gap:8px; margin-top:8px; }
    .editor-option-row { display:grid; grid-template-columns:32px minmax(0,1fr); align-items:center; gap:8px; }
    .editor-option-number { display:grid; place-items:center; width:32px; height:32px; border:2px solid #000; border-radius:50%; background:var(--yellow); box-shadow:1px 1px 0 #000; font:900 12px "DotGothic16",monospace; }
    .editor-option-row:nth-child(even) .editor-option-number { background:var(--cyan); }
    .editor-option-row input { min-height:45px; background:#fff; font-weight:700; box-shadow:2px 2px 0 rgba(0,0,0,.1); }
    .editor-live-note { position:relative; padding-left:42px; background:#fff; }
    .editor-live-note::before { position:absolute; left:10px; top:50%; transform:translateY(-50%); content:'🎥'; font-size:21px; }
    .editor-save-bar { display:grid; gap:8px; padding:10px; background:rgba(255,255,255,.96); }
    .editor-save-guide { margin:0; color:#5E4650; font-size:10px; line-height:1.5; text-align:center; font-weight:900; }
    .editor-save-bar .primary { background:var(--black); }
    .editor-schedule-setting,.editor-creator-image { grid-column:1 / -1; padding:14px; border:3px solid #000; border-radius:14px; background:#fff; box-shadow:3px 3px 0 rgba(0,0,0,.14); }
    .editor-schedule-setting { background:#E8FAFD; }
    .editor-schedule-setting .secondary { width:100%; margin-top:4px; }
    .capacity-notice { display:grid; gap:4px; margin-top:12px; padding:13px; border:3px solid #000; border-radius:12px; background:var(--yellow); box-shadow:3px 3px 0 #000; }
    .capacity-notice strong { font-size:15px; }
    .capacity-notice span { font-size:11px; line-height:1.65; font-weight:800; }
    .schedule-ok { background:#DDF8E4; color:#155D2B; }
    .creator-image-preview { display:flex; align-items:center; gap:14px; margin-top:10px; padding:12px; border:2px solid #000; border-radius:12px; background:#FFF8F1; }
    .creator-image-preview img { width:96px; height:96px; border:3px solid #000; border-radius:50%; object-fit:cover; background:#fff; }
    .creator-image-preview .mini { flex:1; }
    .editor-channel-verification { grid-column:1 / -1; padding:14px; border:3px solid #000; border-radius:14px; background:#F2EEFF; box-shadow:3px 3px 0 rgba(0,0,0,.14); }
    .verification-progress { display:grid; gap:8px; margin:14px 0; }
    .verification-step { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 12px; border:2px solid #000; border-radius:10px; background:#FFF1BD; font-size:11px; }
    .verification-step.is-done { background:#DDF8E4; color:#155D2B; }
    .verification-step span { text-align:right; font-weight:800; }
    .verification-methods { display:grid; gap:14px; margin-top:16px; }
    .verification-methods .question-card { box-shadow:3px 3px 0 #000; }
    .verification-methods h3 { margin-top:8px; }
    .verification-methods button { width:100%; margin-top:12px; }
    .agreement-panel { margin-top:18px; padding:16px; border:3px solid #000; border-radius:15px; background:#FFF9D7; box-shadow:4px 4px 0 #000; }
    .agreement-panel h3 { margin-top:8px; font-size:18px; }
    .agreement-complete { background:#DDF8E4; }
    .agreement-summary { display:grid; gap:7px; margin-top:13px; padding:13px; border:2px solid #000; border-radius:11px; background:#fff; font-size:12px; line-height:1.6; }
    .agreement-summary a { color:#7E1235; font-weight:900; }
    .agreement-check { display:flex; align-items:flex-start; gap:9px; margin-top:12px; padding:11px; border:2px solid #000; border-radius:10px; background:#fff; font-size:12px; line-height:1.6; font-weight:800; }
    .agreement-check input { flex:0 0 22px; width:22px; min-height:22px; margin-top:1px; accent-color:var(--pink); }
    .agreement-panel > .primary { margin-top:14px; }
    .agreement-receipt { display:grid; gap:7px; margin:14px 0 0; }
    .agreement-receipt div { display:grid; grid-template-columns:90px minmax(0,1fr); gap:8px; padding:8px 0; border-bottom:1px dashed #6A8C72; font-size:11px; }
    .agreement-receipt dt { font-weight:900; }
    .agreement-receipt dd { min-width:0; margin:0; overflow-wrap:anywhere; }
    .live-result-image-panel { overflow:hidden; background:linear-gradient(145deg,#FFF5A8,#FFD9E8 55%,#DDF8FC); }
    .live-result-preview { display:block; width:100%; margin-top:12px; border:3px solid #000; border-radius:14px; background:#fff; box-shadow:4px 4px 0 #000; }
