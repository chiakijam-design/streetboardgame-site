<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>遠隔で遊ぶ | 彼氏の愛情判定ゲーム</title>
  <meta name="description" content="彼氏の愛情判定ゲームをルームコードで遠隔プレイ。まずは彼氏の愛情判定だけ対応しています。" />
  <link rel="canonical" href="https://www.streetboardgame.com/remote" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=RocknRoll+One&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ec4f88;
      --cyan: #5bd4e8;
      --yellow: #ffe26b;
      --black: #1a1a1a;
      --white: #fff;
      --cream: #fff8f1;
      --soft: #7a6a6f;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--pink); color: var(--black); overflow-x: hidden; }
    body {
      font-family: "Zen Maru Gothic", "Noto Sans JP", sans-serif;
      -webkit-font-smoothing: antialiased;
      touch-action: pan-y;
    }
    button, input, select { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    a { color: inherit; }
    .app {
      width: min(100%, 480px);
      max-width: 480px;
      min-height: 100dvh;
      margin: 0 auto;
      background: var(--pink);
      box-shadow: 0 0 60px rgba(0,0,0,.15);
      padding: 18px 18px 42px;
      overflow-x: hidden;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 3px solid var(--black);
      background: var(--white);
      color: var(--black);
      box-shadow: 3px 3px 0 #000;
      font-weight: 900;
      text-decoration: none;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 18px;
      border-radius: 999px;
      border: 2px solid var(--white);
      color: var(--white);
      font: 700 13px "DotGothic16", monospace;
      letter-spacing: .14em;
    }
    h1, h2, p { margin: 0; }
    .hero {
      background: var(--black);
      color: var(--white);
      border-radius: 18px;
      padding: 22px 18px;
      border: 3px solid var(--black);
      box-shadow: 5px 5px 0 #000;
      text-align: center;
    }
    .logo {
      margin-top: 12px;
      color: var(--white);
      font-family: "RocknRoll One", "Zen Maru Gothic", sans-serif;
      font-size: clamp(28px, 8vw, 40px);
      line-height: 1.18;
      text-shadow: 3px 3px 0 var(--cyan), -1px -1px 0 var(--cyan);
    }
    .hero p {
      margin-top: 12px;
      color: rgba(255,255,255,.9);
      font-size: 13px;
      line-height: 1.8;
      font-weight: 800;
    }
    .card {
      margin-top: 18px;
      padding: 16px;
      border: 3px solid var(--black);
      border-radius: 16px;
      background: var(--white);
      box-shadow: 5px 5px 0 #000;
      max-width: 100%;
      overflow-wrap: anywhere;
    }
    .card.dark { background: var(--black); color: var(--white); }
    .card.yellow { background: var(--yellow); }
    .section-title {
      margin-bottom: 12px;
      font-size: 16px;
      font-weight: 900;
    }
    .grid { display: grid; gap: 12px; }
    .two { grid-template-columns: 1fr 1fr; }
    label { display: grid; gap: 6px; font-size: 12px; font-weight: 900; }
    input, select {
      width: 100%;
      min-height: 46px;
      border: 2.5px solid var(--black);
      border-radius: 12px;
      padding: 0 12px;
      background: var(--cream);
      color: var(--black);
      font-weight: 900;
    }
    .btn {
      width: 100%;
      min-height: 58px;
      border: 3px solid var(--black);
      border-radius: 14px;
      background: var(--black);
      color: var(--white);
      box-shadow: 4px 4px 0 var(--cyan);
      font-family: "RocknRoll One", "Zen Maru Gothic", sans-serif;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
    }
    .btn.yellow {
      background: var(--yellow);
      color: var(--black);
      box-shadow: 4px 4px 0 #000;
    }
    .btn.white {
      background: var(--white);
      color: var(--black);
      box-shadow: 4px 4px 0 #000;
    }
    .btn.small { min-height: 46px; font-size: 13px; }
    .btn:disabled { opacity: .55; cursor: wait; }
    .code {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      padding: 0 22px;
      border: 3px dashed var(--black);
      border-radius: 14px;
      background: var(--cream);
      font: 900 34px "DotGothic16", monospace;
      letter-spacing: .18em;
      max-width: 100%;
      line-height: 1;
    }
    .muted {
      color: var(--soft);
      font-size: 12px;
      line-height: 1.7;
      font-weight: 800;
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 2px solid var(--black);
      background: var(--cream);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.6;
    }
    .question-img {
      width: min(100%, 320px);
      display: block;
      margin: 0 auto;
      border: 3px solid var(--white);
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(0,0,0,.25);
      background: var(--white);
    }
    .choices {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .choice {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      padding: 8px 12px;
      border: 2.5px solid var(--black);
      border-radius: 12px;
      background: var(--white);
      color: var(--black);
      box-shadow: 2px 2px 0 #000;
      font-weight: 900;
      text-align: left;
      transition: transform .08s ease, background .12s ease, box-shadow .12s ease;
    }
    .choice:not(:disabled):active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 #000;
    }
    .choice.is-selected {
      background: var(--yellow);
      border-width: 4px;
      box-shadow: 4px 4px 0 var(--cyan);
      transform: translateY(-1px);
    }
    .choice.is-locked {
      background: #fff1a8;
      border-color: var(--black);
      color: rgba(26,26,26,.72);
      box-shadow: 2px 2px 0 rgba(0,0,0,.55);
      cursor: not-allowed;
    }
    .choice.is-locked::after {
      content: "選択済み";
      justify-self: end;
      padding: 4px 8px;
      border: 2px solid rgba(26,26,26,.65);
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      color: var(--pink);
      font-size: 11px;
      font-weight: 900;
    }
    .choice.is-waiting {
      cursor: wait;
    }
    .choice.is-waiting::after {
      content: "送信中…";
      justify-self: end;
      padding: 4px 8px;
      border: 2px solid var(--black);
      border-radius: 999px;
      background: var(--white);
      color: var(--pink);
      font-size: 11px;
      font-weight: 900;
    }
    .choice:disabled:not(.is-selected):not(.is-locked) {
      opacity: .58;
    }
    .dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,.2);
      box-shadow: 0 4px 10px rgba(0,0,0,.25);
    }
    .score {
      font-family: "RocknRoll One", "Zen Maru Gothic", sans-serif;
      font-size: 52px;
      color: var(--pink);
      line-height: 1;
      text-shadow: 4px 4px 0 #000;
    }
    .result-frame {
      overflow: hidden;
      padding: 0 0 16px;
      background: var(--white);
    }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: -16px -16px 14px;
      padding: 12px 14px;
      background: var(--black);
      color: var(--white);
      font: 700 12px "DotGothic16", monospace;
      letter-spacing: .12em;
    }
    .result-tag {
      flex: 0 0 auto;
      padding: 5px 12px;
      border-radius: 999px;
      border: 2px solid var(--white);
      background: var(--pink);
      color: var(--white);
      font: 900 12px "Zen Maru Gothic", sans-serif;
      letter-spacing: .04em;
    }
    .result-score-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 118px;
      gap: 8px;
      align-items: center;
      margin: 0 0 14px;
      padding: 14px;
      border: 3px dashed var(--pink);
      border-radius: 16px;
      background: var(--cream);
    }
    .result-score-label {
      color: var(--pink);
      font-weight: 900;
      line-height: 1.25;
      font-size: 13px;
    }
    .result-score-mark {
      display: inline-flex;
      margin-top: 4px;
      padding: 3px 10px;
      border: 2px solid var(--black);
      border-radius: 999px;
      background: var(--yellow);
      font-size: 12px;
      font-weight: 900;
    }
    .result-girl {
      position: relative;
      min-height: 146px;
      display: flex;
      align-items: end;
      justify-content: center;
    }
    .result-girl::before {
      content: "";
      position: absolute;
      width: 116px;
      height: 116px;
      border-radius: 50%;
      background: rgba(91,212,232,.18);
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }
    .result-girl img {
      position: relative;
      z-index: 1;
      width: 118px;
      height: auto;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.15));
    }
    .result-title-pill {
      display: inline-flex;
      justify-content: center;
      padding: 4px 16px;
      border-radius: 999px;
      background: var(--black);
      color: var(--yellow);
      font-weight: 900;
      font-size: 12px;
    }
    .result-rank-title {
      margin-top: 8px;
      color: var(--pink);
      font-family: "RocknRoll One", "Zen Maru Gothic", sans-serif;
      font-size: clamp(24px, 7vw, 34px);
      line-height: 1.25;
      text-align: center;
    }
    .result-comment {
      margin-top: 14px;
      padding: 14px 12px;
      border: 3px solid var(--black);
      border-radius: 14px;
      background: var(--white);
      box-shadow: 3px 3px 0 #000;
      text-align: center;
      white-space: pre-line;
      font-weight: 900;
      line-height: 1.8;
      font-size: 13px;
    }
    .answer-summary {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-top: 16px;
    }
    .answer-chip {
      min-height: 54px;
      border: 2px solid var(--black);
      border-radius: 10px;
      background: var(--white);
      box-shadow: 2px 2px 0 #000;
      display: grid;
      place-items: center;
      gap: 2px;
      font-weight: 900;
      font-size: 10px;
    }
    .answer-chip.hit { background: var(--yellow); }
    .answer-chip span:last-child { font-size: 18px; line-height: 1; }
    .share-card {
      margin-top: 18px;
      padding: 14px;
      border: 3px solid var(--black);
      border-radius: 16px;
      background: var(--yellow);
      box-shadow: 5px 5px 0 #000;
      text-align: center;
      font-weight: 900;
    }
    .share-card .share-label {
      display: inline-flex;
      padding: 3px 12px;
      border-radius: 999px;
      background: var(--black);
      color: var(--white);
      font: 700 11px "DotGothic16", monospace;
      letter-spacing: .12em;
      margin-bottom: 8px;
    }
    .share-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .share-actions .line-share {
      background: #06c755;
      color: #fff;
      box-shadow: 4px 4px 0 #000;
    }
    .share-actions .x-share {
      background: var(--black);
      color: #fff;
      box-shadow: 4px 4px 0 var(--cyan);
    }
    .save-share {
      margin-top: 10px;
      background: var(--white);
      color: var(--black);
      box-shadow: 4px 4px 0 #000;
    }
    .answer-row {
      border: 2px solid var(--black);
      border-radius: 12px;
      overflow: hidden;
      background: var(--white);
      box-shadow: 2px 2px 0 #000;
    }
    .answer-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      background: var(--black);
      color: var(--white);
      font-weight: 900;
      font-size: 12px;
    }
    .answer-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      font-size: 12px;
      font-weight: 900;
    }
    .role-summary {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .room-code-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      min-width: 0;
    }
    .invite-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: min(100%, 360px);
    }
    .line-invite {
      width: 100%;
      min-height: 54px;
      padding: 0 18px;
      border-color: var(--black);
      background: #06c755;
      color: #fff;
      box-shadow: 5px 5px 0 var(--black);
      font-size: 14px;
    }
    .instagram-invite {
      width: 100%;
      min-height: 54px;
      padding: 0 14px;
      border-color: var(--black);
      background: #ec4f88;
      color: #fff;
      box-shadow: 5px 5px 0 var(--black);
      font-size: 13px;
    }
    .role-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 2px solid var(--black);
      border-radius: 12px;
      background: var(--cream);
      font-size: 12px;
      font-weight: 900;
      min-width: 0;
    }
    .role-line strong {
      font-size: 14px;
      min-width: 0;
      overflow-wrap: anywhere;
      text-align: right;
    }
    .hidden { display: none !important; }
    @media (max-width: 420px) {
      .app { padding-left: 14px; padding-right: 14px; }
      .card { padding: 14px; }
      .code {
        width: min(100%, 230px);
        padding: 0 16px;
        font-size: 32px;
        letter-spacing: .12em;
      }
      .invite-buttons {
        width: min(100%, 230px);
        grid-template-columns: 1fr;
      }
      .line-invite,
      .instagram-invite {
        box-shadow: 4px 4px 0 var(--black);
      }
      .result-score-box {
        grid-template-columns: minmax(0, 1fr) 104px;
        padding: 12px;
      }
      .result-girl img { width: 104px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <a class="back" href="/">← トップに戻る</a>
      <span class="pill">REMOTE LOVE</span>
    </div>

    <section class="hero">
      <div class="pill">ROOM CODE</div>
      <h1 class="logo">遠隔で<br>愛情判定</h1>
      <p>離れていても、2人それぞれのスマホで遊べます。まずは彼氏の愛情判定だけ対応中です。</p>
    </section>

    <section id="setup" class="card">
      <h2 class="section-title">ルームを作る</h2>
      <div class="grid">
        <label>誰の愛情を判定する？
          <select id="direction">
            <option value="girlTarget">彼氏の愛情判定：彼女の答えを彼氏が当てる</option>
            <option value="boyTarget">彼女の愛情判定：彼氏の答えを彼女が当てる</option>
          </select>
        </label>
        <div class="grid two">
          <label>彼女の名前
            <input id="girlName" maxlength="6" placeholder="彼女" />
          </label>
          <label>彼氏の名前
            <input id="boyName" maxlength="6" placeholder="彼氏" />
          </label>
        </div>
        <label>あなたはどちら？
          <select id="creatorSide">
            <option value="boy">私は彼氏</option>
            <option value="girl">私は彼女</option>
          </select>
        </label>
        <button id="createRoom" class="btn">ルームコードを発行する ▶</button>
      </div>
      <div class="status">
        ここで決めた設定のまま始まります。相手は6桁コードかURLで入るだけでOKです。
      </div>
    </section>

    <section id="joinPanel" class="card">
      <h2 class="section-title">ルームに入る</h2>
      <div class="grid">
        <label>ルームコード
          <input id="joinCode" inputmode="numeric" maxlength="6" placeholder="例：123456" />
        </label>
        <button id="joinRoom" class="btn yellow">参加する</button>
      </div>
    </section>

    <section id="room" class="card hidden">
      <h2 class="section-title">ルームコード</h2>
      <div class="room-code-actions">
        <span id="roomCode" class="code"></span>
        <div class="invite-buttons">
          <button id="shareRoomLine" class="btn line-invite" type="button">LINEでURLを送る</button>
          <button id="shareRoomInstagram" class="btn instagram-invite" type="button">InstagramでURLを送る</button>
        </div>
      </div>
      <p id="roomNames" class="muted" style="margin-top:12px;text-align:center"></p>
      <div class="role-summary">
        <div class="role-line">
          <span>答える人</span>
          <strong id="targetRoleName"></strong>
        </div>
        <div class="role-line">
          <span>予想する人</span>
          <strong id="guesserRoleName"></strong>
        </div>
      </div>
      <div id="roleStatus" class="status">ルーム設定を確認中です。</div>
    </section>

    <section id="play" class="card hidden">
      <h2 id="turnTitle" class="section-title"></h2>
      <p id="turnNote" class="muted"></p>
      <div id="questionWrap" style="margin-top:12px"></div>
      <div id="choices" class="choices"></div>
    </section>

    <section id="result" class="card result-frame hidden">
      <div class="result-header">
        <span id="resultGameTitle">彼氏の愛情判定</span>
        <span id="resultTag" class="result-tag">UPDATE中</span>
      </div>
      <div class="result-score-box">
        <div>
          <div id="scoreLabel" class="result-score-label">彼氏の彼女理解度</div>
          <div id="score" class="score"></div>
          <span class="result-score-mark">問正解</span>
        </div>
        <div class="result-girl">
          <img src="/assets/character/girl-default.webp" alt="わたちゃん">
        </div>
      </div>
      <div style="text-align:center">
        <div class="result-title-pill">今日の称号</div>
        <h2 id="resultTitle" class="result-rank-title"></h2>
        <p id="scoreText" class="result-comment"></p>
      </div>
      <div id="answerSummary" class="answer-summary"></div>
      <h2 class="section-title" style="margin-top:18px">答え合わせ</h2>
      <div id="answerDetails" class="grid"></div>
      <div class="share-card">
        <div class="share-label">SHARE YOUR RESULT</div>
        <h2 class="section-title" style="margin-bottom:4px">この結果、友達に伝えよう</h2>
        <p class="muted" style="color:var(--black)">XやLINEはURLつきで送れます。Instagramはプロフィールリンクへ</p>
        <div class="share-actions">
          <button id="shareResultLine" class="btn line-share" type="button">LINEで結果を送る</button>
          <button id="shareResultX" class="btn x-share" type="button">Xで結果をツイート</button>
        </div>
        <button id="saveResultImage" class="btn save-share" type="button">判定画像も送りたい。まずは画像を保存</button>
      </div>
      <button id="newRoom" class="btn" style="margin-top:18px">新しいルームを作る</button>
    </section>
  </main>

  <script src="prototype_quiz_data.js?v=seo-1"></script>
  <script src="remote_love.js?v=remote-love-12"></script>
</body>
</html>
